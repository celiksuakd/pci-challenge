<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCI CHALLENGE — Instrumentation Lockdown</title>
<style>
  :root {
    --bg: #07090f;
    --bg2: #0e1320;
    --card: #131a2c;
    --card2: #1a2340;
    --text: #e6f1ff;
    --muted: #6b7a99;
    --accent: #00ff9f;
    --accent2: #00d9ff;
    --danger: #ff3860;
    --warn: #ffb800;
    --locked: #2a3147;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,255,159,0.02) 0px,
      rgba(0,255,159,0.02) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 9999;
  }
  body::after {
    content: "";
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
    z-index: 9998;
  }
  #app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* HUD */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 18px;
    background: var(--card);
    border: 1px solid var(--accent);
    box-shadow: 0 0 20px rgba(0,255,159,0.15);
    margin-bottom: 20px;
    border-radius: 6px;
  }
  .hud-item { display: flex; gap: 8px; align-items: center; font-size: 14px; }
  .hud-label { color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-size: 11px; }
  .hud-value { color: var(--accent); font-weight: bold; font-size: 18px; }
  .lives { display: flex; gap: 4px; }
  .life { width: 18px; height: 18px; color: var(--danger); font-size: 18px; line-height: 1; }
  .life.lost { color: var(--locked); }
  .streak.hot .hud-value { color: var(--warn); text-shadow: 0 0 10px var(--warn); }
  .streak.fire .hud-value { color: var(--danger); text-shadow: 0 0 14px var(--danger); animation: pulse 0.6s infinite; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-3px, 2px); }
    40% { transform: translate(3px, -2px); }
    60% { transform: translate(-2px, -2px); }
    80% { transform: translate(2px, 2px); }
    100% { transform: translate(0); }
  }

  /* TITLE SCREEN */
  .title-screen { text-align: center; padding-top: 80px; }
  .title {
    font-size: 64px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 24px var(--accent), 0 0 60px rgba(0,255,159,0.3);
    margin-bottom: 12px;
  }
  .subtitle {
    color: var(--accent2);
    letter-spacing: 6px;
    margin-bottom: 8px;
    font-size: 14px;
  }
  .tagline {
    color: var(--muted);
    margin-bottom: 60px;
    font-size: 15px;
  }
  .boot-log {
    text-align: left;
    max-width: 500px;
    margin: 30px auto;
    background: var(--bg2);
    border: 1px solid var(--locked);
    padding: 16px;
    font-size: 12px;
    color: var(--muted);
    min-height: 140px;
  }
  .boot-log .line { margin: 2px 0; }
  .boot-log .ok { color: var(--accent); }
  .boot-log .warn { color: var(--warn); }

  .btn {
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    padding: 14px 32px;
    font-family: inherit;
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    margin: 6px;
  }
  .btn:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 24px var(--accent);
  }
  .btn.secondary { border-color: var(--muted); color: var(--muted); }
  .btn.secondary:hover { background: var(--muted); color: var(--bg); box-shadow: none; }
  .btn.danger { border-color: var(--danger); color: var(--danger); }
  .btn.danger:hover { background: var(--danger); color: var(--bg); box-shadow: 0 0 24px var(--danger); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* MAP */
  .map-header { text-align: center; margin-bottom: 24px; }
  .map-title { font-size: 28px; color: var(--accent); letter-spacing: 3px; }
  .map-sub { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .room-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .room-card {
    background: var(--card);
    border: 1px solid var(--locked);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .room-card.unlocked {
    border-color: var(--accent2);
    box-shadow: 0 0 12px rgba(0,217,255,0.2);
  }
  .room-card.unlocked:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
    box-shadow: 0 0 24px rgba(0,255,159,0.4);
  }
  .room-card.completed {
    border-color: var(--accent);
    background: linear-gradient(135deg, var(--card) 0%, rgba(0,255,159,0.06) 100%);
  }
  .room-card.locked { opacity: 0.4; cursor: not-allowed; }
  .room-card.boss {
    grid-column: span 2;
    background: linear-gradient(135deg, var(--card2) 0%, rgba(255,56,96,0.08) 100%);
    border-color: var(--danger);
  }
  .room-card.boss.locked { border-color: var(--locked); }
  .room-id {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .room-name { font-size: 14px; font-weight: 600; line-height: 1.4; color: var(--text); }
  .room-date { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .room-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .stars { color: var(--warn); letter-spacing: 2px; font-size: 14px; }
  .mastery { font-size: 11px; color: var(--accent); }
  .lock-icon { color: var(--muted); }

  /* ROOM (in-game) */
  .question-screen { padding: 0; }
  .question-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--locked);
  }
  .breadcrumb { color: var(--muted); font-size: 12px; letter-spacing: 2px; }
  .breadcrumb .accent { color: var(--accent); }
  .q-progress { color: var(--accent2); font-size: 13px; }

  .question-card {
    background: var(--card);
    border: 1px solid var(--accent2);
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(0,217,255,0.1);
  }
  .q-type-badge {
    display: inline-block;
    background: var(--bg2);
    color: var(--accent2);
    padding: 4px 10px;
    font-size: 10px;
    letter-spacing: 2px;
    margin-bottom: 16px;
    border: 1px solid var(--accent2);
  }
  .q-prompt {
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 18px;
    line-height: 1.6;
    margin-bottom: 24px;
    color: var(--text);
  }
  .q-prompt code, .q-prompt .eq {
    font-family: ui-monospace, monospace;
    background: var(--bg2);
    padding: 1px 6px;
    color: var(--accent);
    border-radius: 3px;
  }

  /* MCQ options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: var(--bg2);
    border: 1px solid var(--locked);
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 15px;
    color: var(--text);
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option:hover { border-color: var(--accent2); background: var(--card2); }
  .option.selected { border-color: var(--accent); background: rgba(0,255,159,0.08); }
  .option.correct { border-color: var(--accent); background: rgba(0,255,159,0.18); box-shadow: 0 0 16px rgba(0,255,159,0.3); }
  .option.wrong { border-color: var(--danger); background: rgba(255,56,96,0.15); animation: glitch 0.3s; }
  .option-letter {
    display: inline-block;
    width: 28px; height: 28px;
    border: 1px solid var(--muted);
    text-align: center;
    line-height: 26px;
    font-weight: bold;
    color: var(--muted);
    flex-shrink: 0;
  }
  .option.selected .option-letter, .option.correct .option-letter { border-color: var(--accent); color: var(--accent); }
  .option.wrong .option-letter { border-color: var(--danger); color: var(--danger); }

  /* Numeric input */
  .numeric-wrap { display: flex; gap: 12px; align-items: center; }
  .numeric-input {
    background: var(--bg2);
    border: 1px solid var(--accent2);
    color: var(--accent);
    padding: 14px 18px;
    font-family: inherit;
    font-size: 24px;
    width: 200px;
    text-align: center;
    letter-spacing: 1px;
  }
  .numeric-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .numeric-units { color: var(--muted); font-size: 14px; }

  /* Match */
  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .match-col-label {
    color: var(--accent2);
    font-size: 11px;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .match-item {
    background: var(--bg2);
    border: 1px solid var(--locked);
    padding: 12px;
    cursor: pointer;
    margin-bottom: 8px;
    transition: all 0.15s;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 14px;
  }
  .match-item:hover { border-color: var(--accent2); }
  .match-item.selected { border-color: var(--accent); background: rgba(0,255,159,0.1); }
  .match-item.paired { opacity: 0.5; cursor: default; border-color: var(--accent); background: rgba(0,255,159,0.05); }
  .match-pair-tag { display: inline-block; color: var(--accent); margin-right: 6px; font-weight: bold; }

  /* Feedback */
  .feedback {
    margin-top: 20px;
    padding: 16px;
    border-left: 3px solid;
    background: var(--bg2);
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }
  .feedback.correct { border-color: var(--accent); }
  .feedback.wrong { border-color: var(--danger); }
  .feedback-title { font-weight: bold; margin-bottom: 6px; font-family: inherit; letter-spacing: 2px; }
  .feedback.correct .feedback-title { color: var(--accent); }
  .feedback.wrong .feedback-title { color: var(--danger); }
  .feedback-explain { color: var(--muted); }

  .q-actions { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }

  /* Results */
  .result-screen { text-align: center; padding: 40px 0; }
  .result-headline { font-size: 32px; color: var(--accent); letter-spacing: 4px; margin-bottom: 12px; }
  .result-headline.fail { color: var(--danger); }
  .result-room { color: var(--muted); margin-bottom: 32px; }
  .result-stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 40px;
  }
  .result-stat { }
  .result-stat-value { font-size: 36px; color: var(--accent); font-weight: bold; }
  .result-stat-label { font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-top: 4px; }
  .result-stars { font-size: 48px; color: var(--warn); letter-spacing: 8px; margin: 20px 0; }

  /* Boss screen accent */
  .boss-mode .question-card { border-color: var(--danger); box-shadow: 0 0 24px rgba(255,56,96,0.2); }
  .boss-mode .q-type-badge { border-color: var(--danger); color: var(--danger); }
  .boss-timer { color: var(--danger); font-size: 24px; font-weight: bold; letter-spacing: 2px; }
  .boss-timer.critical { animation: flicker 0.4s infinite; }

  /* Misc */
  .center { text-align: center; }
  .mt-lg { margin-top: 32px; }
  .ascii { font-family: monospace; white-space: pre; line-height: 1.1; color: var(--accent); opacity: 0.5; font-size: 11px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================================
// QUESTION BANK — DCoCP (Dynamics and Control of Chemical Processes)
// Course: Prof. Matteo Pelucchi, Politecnico di Milano, AY 2025/26
// Based on Stephanopoulos "Chemical Process Control" + course calendar
// ============================================================

const ROOMS = [
  {
    id: 'L1', date: 'WK1', name: 'Why Control & Loop Design', questions: [
      { type: 'mcq', prompt: 'Visconti opens with FIVE reasons we must control an industrial process. They are:',
        options: ['Cost, Speed, Volume, Throughput, Profit', 'Safety, Product specs, Environmental regulations, Operative reasons, Economics (OPEX)', 'Quality, Quantity, Cost', 'Just Safety'],
        correct: 1, explain: 'Slide L1 p.8 (Visconti). Note the ORDER: Safety first. Threshold limits on T, P, concentrations. Then product specs (often purity), then environmental, then operative envelope, then OPEX minimization.' },
      { type: 'mcq', prompt: 'The THREE actions a control system must enable (Visconti):',
        options: ['Start, monitor, stop', '(i) Suppress external disturbances, (ii) Ensure process stability, (iii) Optimize process performance', 'Heating, cooling, mixing', 'Buy, sell, store'],
        correct: 1, explain: 'Slide L1 p.8 (Visconti). Disturbance rejection + stabilization + optimization. Setpoint tracking is implied (a setpoint move is just a "designed disturbance").' },
      { type: 'mcq', prompt: 'According to Visconti, INPUT variables split into:',
        options: ['Hot and cold streams', 'MANIPULATED (varied through control loop) and DISTURBANCE (cannot be varied — sometimes measured, sometimes not)', 'Liquid and gas', 'High and low pressure'],
        correct: 1, explain: 'Slide L1 p.18 (Visconti). OUTPUT variables split into MEASURED and NON-MEASURED. The choice of measured + manipulated variable is the first design decision.' },
      { type: 'mcq', prompt: 'Visconti\'s FIVE-STEP control loop design procedure (in order):',
        options: ['Buy hardware → install → tune → operate → audit', '(1) Define control target; (2) Choose measured variable; (3) Choose manipulated variable; (4) Define configuration (FB / FF / inferential); (5) Define control law (P, PI, PID…)', 'Choose PID → tune → done', 'Random order'],
        correct: 1, explain: 'Slide L1 p.19–24 (Visconti). Skip step 1 and you don\'t know what success looks like. Reverse 2 and 3 and you may pick a measurement that has no causal link to your manipulator.' },
      { type: 'error', prompt: 'Three statements are TRUE per Visconti, one is FALSE.',
        statements: [
          'In chemical industry, most processing systems are MIMO (multiple inputs, multiple outputs)',
          'SISO is simpler to design and understand; understanding it is the foundation for MIMO',
          'Inferential control is used when the targeted variable cannot be directly measured — measure a proxy and correlate',
          'For a TRULY STABLE (self-regulating) process, you still NEED a control loop for stability itself'
        ], wrongIndex: 3, explain: 'Slide L1 p.14 (Visconti): "For a truly stable, self-regulating process, we generally DO NOT need a control loop just for stability." You may still want one for SP tracking, disturbance rejection, or optimization — but not for stability.' }
    ]
  },
  {
    id: 'L2', date: 'WK2', name: 'Stability & Operating Points', questions: [
      { type: 'mcq', prompt: 'Visconti\'s jacketed exothermic CSTR example has three operating points P1, P2, P3 on the heat-removal vs heat-generation diagram. Which is the UNSTABLE one?',
        options: ['All three', 'P1 and P3 are STABLE (autoregulating); P2 is UNSTABLE — needs control', 'P1 only', 'None — all need control'],
        correct: 1, explain: 'Slide L1 p.15 (Visconti). At P2 the heat-generation curve cuts the heat-removal line from below — a small T perturbation grows. Classic Van Heerden analysis. The middle intersection of an exothermic-CSTR is always the unstable one.' },
      { type: 'mcq', prompt: 'According to Visconti, an AUTOREGULATING process:',
        options: ['Cannot be controlled', 'Naturally dampens deviations and settles back to steady state without external action', 'Always oscillates', 'Has no dynamics'],
        correct: 1, explain: 'Slide L1 p.14 (Visconti). Most industrial processes are autoregulating; you control them for set-point tracking, disturbance rejection, or optimization, not for fundamental stability.' },
      { type: 'mcq', prompt: 'In an UNSTABLE (non-autoregulating) process:',
        options: ['Disturbances simply die out', 'The variable moves away from setpoint and either grows or runs away — control is MANDATORY', 'Speed is too high', 'Output equals input'],
        correct: 1, explain: 'Slide L1 p.14. Examples: an integrating (pure capacitive) tank with no level outflow correction; a thermally runaway-prone reactor at the wrong operating point. Without control, the system diverges.' },
      { type: 'mcq', prompt: 'Visconti also notes a BATCH endothermic A→B→C reactor (B is target). Why is OPTIMIZATION the control objective here, not just stability?',
        options: ['Stability is not relevant in batch', 'There is an OPTIMAL steam-flow trajectory: high early to push A→B fast, then cool down to avoid B→C → profit ∝ ∫(earnings − steam cost − C-disposal − A-cost) dt', 'B never forms', 'Endothermic reactions are always stable'],
        correct: 1, explain: 'Slide L1 p.16 (Visconti). The profile-optimization problem is the heart of batch control — operate the trajectory that maximizes ∫(value-stream) over the batch time t_R.' },
      { type: 'mcq', prompt: 'Visconti\'s textbook (and reference) for the course is:',
        options: ['Coulson & Richardson', 'Stephanopoulos — "Chemical Process Control: An Introduction to Theory and Practice"; plus Toghraei "P&ID Development"', 'Levenspiel', 'Perry\'s Handbook'],
        correct: 1, explain: 'Slide L1 p.5 (Visconti references). Stephanopoulos is the same textbook used in Pelucchi\'s DCoCP — your year-2 control sequence shares one canonical text.' }
    ]
  },
  {
    id: 'L3', date: 'WK3', name: '1st-Order & Pure-Capacitive Dynamics', questions: [
      { type: 'mcq', prompt: 'According to Visconti, a 1st-order process is characterized by:',
        options: ['No memory at all', 'CAPACITY to store material or energy AND RESISTANCE to the flow of mass/energy reaching that capacity', 'Pure oscillation', 'Pure delay'],
        correct: 1, explain: 'Visconti lab notes (1st-order dynamics page). Tank with gravity outflow = level capacity + outflow resistance. Heat exchanger = thermal capacity + heat transfer resistance. Time constant τ = capacity × resistance.' },
      { type: 'mcq', prompt: 'A PURE-CAPACITIVE (integrating) process has:',
        options: ['Self-regulating behavior', 'NO MEMORY of an equilibrium — accumulates whatever you give it; example: tank with CONSTANT-flow (positive-displacement) pump on outlet → level integrates inflow indefinitely', 'A fast time constant', 'Instant equilibration'],
        correct: 1, explain: 'Visconti lab notes. Removing the outflow resistance kills self-regulation. Pure capacitive systems are open-loop UNSTABLE — must be controlled to bound the state.' },
      { type: 'mcq', prompt: 'Visconti states the MAJORITY of processes relevant for chemical engineers are:',
        options: ['Higher-order (4+) systems', 'First-order or pure-capacitive', 'Always 2nd order', 'Discrete'],
        correct: 1, explain: 'Visconti notes. This is good news: simple dynamics → tuning is tractable. The complexity arises mostly from interactions (cascade, MIMO, recycle).' },
      { type: 'mcq', prompt: 'Two NON-INTERACTING 1st-order tanks in series form a 2nd-order system. The outlet level h_2(t) responds with:',
        options: ['Same as a single tank', 'An INITIAL DELAY (S-shaped curve) because Tank 1 must fill first before significantly changing Tank 2 inflow; result is OVERDAMPED (sluggish, no overshoot)', 'Immediate overshoot', 'Oscillation'],
        correct: 1, explain: 'Visconti lab notes on multicapacitive 2nd-order. The "S-curve" signature is what tells you you\'re dealing with cascade of capacities, not a true 2nd-order resonance.' },
      { type: 'numeric', prompt: 'A 1st-order system has τ = 4 min. After a step input, what % of the final value is reached at t = τ?',
        answer: 63.2, tolerance: 1, units: '%',
        explain: 'y(τ) = K·M·(1 − e⁻¹) = 0.632·K·M. The 63.2% rule is the textbook way to read τ off a step response. 95% at 3τ; 99% at 5τ.' }
    ]
  },
  {
    id: 'L4', date: 'WK4', name: '2nd-Order Dynamics & Damping', questions: [
      { type: 'mcq', prompt: 'In Visconti\'s analogy, controlling a 1st-order "door with hydraulic closer" with a high-gain controller is like:',
        options: ['Adding a second door', 'Hiring "a very aggressive person" — the door slams past the latch and BOUNCES (oscillation = hallmark of 2nd-order behavior introduced by the controller)', 'Removing the hinge', 'Removing the closer'],
        correct: 1, explain: 'Visconti lab notes. Fast response + low damping → overshoot and ringing. The control system can turn a benign 1st-order process into an oscillatory 2nd-order closed loop.' },
      { type: 'mcq', prompt: 'An INHERENTLY 2nd-order system shows OVERDAMPED behavior when:',
        options: ['ζ = 0', 'Damping ratio ζ > 1 — sluggish, monotonic approach, no overshoot, no oscillation', 'ζ = 0.5', 'The system has no resistance'],
        correct: 1, explain: 'Visconti notes. ζ > 1 = two real distinct poles. ζ = 1 = critical (fastest non-oscillating). ζ < 1 = underdamped (oscillating, overshoot). ζ ≤ 0 = unstable.' },
      { type: 'mcq', prompt: 'For UNDERDAMPED responses, Visconti notes:',
        options: ['They reach SS slower than overdamped', 'They reach the ultimate value QUICKLY but then OSCILLATE around it with progressively decreasing amplitude', 'No oscillation', 'They never settle'],
        correct: 1, explain: 'Visconti lab notes: "underdamped responses are faster than overdamped at the beginning, reaches the ultimate value quickly, but then it does not stay there." Trade-off: speed vs smoothness.' },
      { type: 'mcq', prompt: 'Why does Visconti say controlling LIQUID LEVEL with strong derivative action is generally AVOIDED?',
        options: ['D is illegal', 'Free surface oscillation (waves, agitation) creates a noisy level signal → D-term spikes → valve damage and erratic control', 'D action makes it slower', 'No reason'],
        correct: 1, explain: 'Visconti controller selection notes. The classic rule: avoid D on noisy signals (level, flow). Apply D where the process is slow and smooth (temperature on lagged processes).' },
      { type: 'numeric', prompt: 'For a 2nd-order underdamped step with ζ = 0.4, peak overshoot M_p = exp(−πζ/√(1−ζ²)) ≈ ? (%)',
        answer: 25, tolerance: 3, units: '%',
        explain: 'M_p = exp(−π·0.4/√0.84) = exp(−1.37) ≈ 0.254 → 25%. Design target for most chemical loops: ζ ≈ 0.7 → ~5% overshoot, fast enough to be useful.' }
    ]
  },
  {
    id: 'L5', date: 'WK5', name: 'P Controller — Fast but Inaccurate', questions: [
      { type: 'mcq', prompt: 'P-controller output (Visconti formula):',

const SAVE_KEY = 'pci_challenge_v1';
let state = loadState();

function defaultState() {
  return {
    screen: 'title',
    lives: 3,
    score: 0,
    streak: 0,
    bestStreak: 0,
    totalXp: 0,
    currentRoomId: null,
    currentQIdx: 0,
    currentAnswer: null,
    answered: false,
    lastCorrect: null,
    roomResults: [],  // per-question correct/wrong for current room
    progress: {},     // { L1: { stars: 3, mastery: 100, completed: true }, ... }
    bossUnlocked: false,
    bossDone: false,
    bossTimer: null,
    bossStartTime: null,
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return defaultState();
    const saved = JSON.parse(raw);
    return { ...defaultState(), ...saved, screen: 'title' };  // always return to title on reload
  } catch (e) {
    return defaultState();
  }
}

function save() {
  try {
    const persist = {
      lives: state.lives, score: state.score, bestStreak: state.bestStreak,
      totalXp: state.totalXp, progress: state.progress,
      bossUnlocked: state.bossUnlocked, bossDone: state.bossDone,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(persist));
  } catch (e) {}
}

function resetAll() {
  if (!confirm('Wipe all progress and start over? This cannot be undone.')) return;
  localStorage.removeItem(SAVE_KEY);
  state = defaultState();
  render();
}

// AUDIO (Web Audio API beeps)
// ============================================================
let audioCtx = null;
function beep(freq, dur, type = 'square', vol = 0.04) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}
const sfx = {
  click: () => beep(800, 0.05),
  correct: () => { beep(660, 0.1); setTimeout(() => beep(990, 0.15), 80); },
  wrong: () => { beep(180, 0.2, 'sawtooth', 0.06); },
  unlock: () => { beep(440, 0.08); setTimeout(() => beep(660, 0.08), 70); setTimeout(() => beep(880, 0.15), 140); },
  boss: () => { beep(110, 0.4, 'sawtooth', 0.08); }
};

const app = document.getElementById('app');

function render() {
  switch (state.screen) {

function typeBoot(lines) {
  const el = document.getElementById('bootLog');
  if (!el) return;
  let i = 0;
  function nextLine() {
    if (i >= lines.length) return;
    const d = document.createElement('div');
    d.className = 'line';
    d.innerHTML = lines[i];
    el.appendChild(d);
    i++;
    setTimeout(nextLine, 180);
  }
  nextLine();
}

      </div>
      <div class="room-footer">
        ${allDone ? (state.bossDone ? `<span class="stars">★★★</span><span style="color:var(--danger)">CLEARED</span>` : '<span style="color: var(--danger);">▶ ENTER</span>') : '<span class="lock-icon">🔒 CLEAR ALL ROOMS</span>'}
      </div>
    </div>
  `;

  html += '</div>';
  app.innerHTML = html;
}

function renderRoom() {
  const room = ROOMS.find(r => r.id === state.currentRoomId);
  if (!room) { state.screen = 'map'; render(); return; }
  const q = room.questions[state.currentQIdx];
  let html = renderHUD();
  html += `
    <div class="question-header">
      <div class="breadcrumb">// <span class="accent">${room.id}</span> · ${room.name}</div>
      <div class="q-progress">Q ${state.currentQIdx + 1} / ${room.questions.length}</div>
    </div>
    <div class="question-card">
      <div class="q-type-badge">${q.type.toUpperCase()}</div>
      <div class="q-prompt">${q.prompt}</div>
      ${renderQuestionBody(q)}
      ${state.answered ? renderFeedback(q) : ''}
      <div class="q-actions">
        ${state.answered
          ? `<button class="btn" onclick="nextQuestion()">${state.currentQIdx + 1 >= room.questions.length ? 'FINISH ROOM' : 'NEXT →'}</button>`
          : `<button class="btn" id="submitBtn" onclick="submitAnswer()" ${state.currentAnswer === null ? 'disabled' : ''}>SUBMIT</button>`}
        <button class="btn secondary" onclick="abandonRoom()">EXIT</button>
      </div>
    </div>
  `;
  app.innerHTML = html;
}

function renderQuestionBody(q) {
  const locked = state.answered ? 'style="pointer-events: none;"' : '';
  if (q.type === 'mcq' || q.type === 'error') {
    const options = q.type === 'mcq' ? q.options : q.statements;
    return `<div class="options" ${locked}>` + options.map((opt, i) => {
      let cls = '';
      if (state.currentAnswer === i) cls = 'selected';
      if (state.answered) {
        const correctIdx = q.type === 'mcq' ? q.correct : q.wrongIndex;
        if (i === correctIdx) cls = 'correct';
        else if (i === state.currentAnswer) cls = 'wrong';
      }
      const letter = String.fromCharCode(65 + i);
      return `<div class="option ${cls}" onclick="pickOption(${i})"><span class="option-letter">${letter}</span><span>${opt}</span></div>`;
    }).join('') + '</div>';
  }
  if (q.type === 'numeric') {
    return `
      <div class="numeric-wrap">
        <input type="number" class="numeric-input" id="numInput" step="any"
               value="${state.currentAnswer ?? ''}"
               oninput="state.currentAnswer = this.value === '' ? null : parseFloat(this.value); document.getElementById('submitBtn').disabled = state.currentAnswer === null;"
               onkeydown="if(event.key==='Enter' && !state.answered && state.currentAnswer !== null) submitAnswer();"
               ${state.answered ? 'disabled' : 'autofocus'}>
        <span class="numeric-units">${q.units || ''}</span>
      </div>
    `;
  }
  if (q.type === 'match') {
    // currentAnswer holds: { pairs: { leftIdx: rightIdx }, picking: leftIdx | null }
    if (!state.currentAnswer || typeof state.currentAnswer !== 'object') {
      state.currentAnswer = { pairs: {}, picking: null };
    }
    const ans = state.currentAnswer;
    const rightShuffled = q._shuffledRight || (q._shuffledRight = shuffle(q.pairs.map((p, i) => ({ text: p.right, originalIdx: i }))));
    let html = '<div class="match-grid">';
    // Left column
    html += '<div><div class="match-col-label">TERMS</div>';
    q.pairs.forEach((p, i) => {
      const paired = ans.pairs[i] !== undefined;
      const selected = ans.picking === i;
      const pairTag = paired ? `<span class="match-pair-tag">[${getPairLetter(ans.pairs[i], rightShuffled)}]</span>` : '';
      let revealCls = '';
      if (state.answered) {
        revealCls = ans.pairs[i] === i ? 'correct' : 'wrong';
        revealCls = revealCls === 'correct' ? 'paired' : 'wrong';
      }
      html += `<div class="match-item ${paired ? 'paired' : ''} ${selected ? 'selected' : ''} ${state.answered ? revealCls : ''}"
                onclick="pickMatchLeft(${i})">${pairTag}${p.left}</div>`;
    });
    html += '</div>';
    // Right column (shuffled)
    html += '<div><div class="match-col-label">DEFINITIONS</div>';
    rightShuffled.forEach((r, displayIdx) => {
      const usedBy = Object.entries(ans.pairs).find(([l, rOrig]) => rOrig === r.originalIdx);
      const paired = !!usedBy;
      const letter = String.fromCharCode(65 + displayIdx);
      html += `<div class="match-item ${paired ? 'paired' : ''}" onclick="pickMatchRight(${r.originalIdx})">
                 <span class="match-pair-tag">[${letter}]</span>${r.text}
               </div>`;
    });
    html += '</div></div>';
    return html;
  }
  return '<div>Unsupported question type.</div>';
}

function getPairLetter(originalRightIdx, shuffledRight) {
  const idx = shuffledRight.findIndex(r => r.originalIdx === originalRightIdx);
  return String.fromCharCode(65 + idx);
}

function renderFeedback(q) {
  const correct = state.lastCorrect;
  return `
    <div class="feedback ${correct ? 'correct' : 'wrong'}">
      <div class="feedback-title">${correct ? '✓ CORRECT' : '✗ WRONG'}</div>
      <div class="feedback-explain">${q.explain}</div>
    </div>
  `;
}

function renderResult() {
  const room = ROOMS.find(r => r.id === state.currentRoomId);
  const correct = state.roomResults.filter(r => r).length;
  const total = state.roomResults.length;
  const mastery = Math.round(100 * correct / total);
  const stars = correct === total ? 3 : (correct >= 4 ? 2 : (correct >= 3 ? 1 : 0));
  const pass = correct >= 4;

  // Persist
  if (pass) {
    const existing = state.progress[room.id];
    if (!existing || stars > existing.stars) {
      state.progress[room.id] = { stars, mastery, completed: true };
    } else {
      state.progress[room.id].completed = true;
    }
    sfx.unlock();
  } else {
    sfx.wrong();
  }
  save();

  app.innerHTML = `
    ${renderHUD()}
    <div class="result-screen">
      <div class="result-headline ${pass ? '' : 'fail'}">${pass ? 'ROOM CLEARED' : 'ROOM FAILED'}</div>
      <div class="result-room">${room.id} · ${room.name}</div>
      <div class="result-stars">${'★'.repeat(stars)}${'☆'.repeat(3 - stars)}</div>
      <div class="result-stats">
        <div class="result-stat">
          <div class="result-stat-value">${correct}/${total}</div>
          <div class="result-stat-label">CORRECT</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${mastery}%</div>
          <div class="result-stat-label">MASTERY</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-value">${state.streak}</div>
          <div class="result-stat-label">CURRENT STREAK</div>
        </div>
      </div>
      <div class="mt-lg">
        <button class="btn" onclick="goMap()">RETURN TO MAP</button>
        ${!pass ? `<button class="btn secondary" onclick="startRoom('${room.id}')">RETRY ROOM</button>` : ''}
      </div>
    </div>
  `;
}

function renderBossIntro() {
  sfx.boss();
  app.innerHTML = `
    ${renderHUD()}
    <div class="result-screen boss-mode">
      <div class="result-headline fail">★ FINAL ROUND ★</div>
      <div class="result-room">EXAM SIMULATION · 15 questions · 12 minutes · No retry within run</div>
      <div style="max-width: 600px; margin: 30px auto; line-height: 1.7; font-family: ui-sans-serif, system-ui, sans-serif; color: var(--muted);">
        Mixed topics. Time pressure. 3 lives. <span style="color: var(--accent);">Get 12/15 to clear.</span>
        Each correct answer worth 100 XP × streak multiplier. Boss XP awarded only on clear.
      </div>
      <div class="mt-lg">
        <button class="btn danger" onclick="actuallyStartBoss()">▶ BEGIN</button>
        <button class="btn secondary" onclick="goMap()">NOT YET</button>
      </div>
    </div>
  `;
}

function renderBossResult() {
  const correct = state.roomResults.filter(r => r).length;
  const total = state.roomResults.length;
  const pass = correct >= 12;
  if (pass) {
    state.bossDone = true;
    state.totalXp += 1000;
    save();
    sfx.unlock();
  } else {
    sfx.wrong();
  }
  app.innerHTML = `
    ${renderHUD()}
    <div class="result-screen boss-mode">
      <div class="result-headline ${pass ? '' : 'fail'}">${pass ? '★ BOSS DEFEATED ★' : 'BOSS WON'}</div>
      <div class="result-room">${correct}/${total} correct · ${Math.round(100*correct/total)}% mastery</div>
      ${pass ? '<div style="color: var(--accent); margin: 30px 0; font-size: 18px;">+1000 BONUS XP · You are exam-ready.</div>' : '<div style="color: var(--muted); margin: 30px 0;">Return to the map, polish weak rooms, try again.</div>'}
      <div class="mt-lg">
        <button class="btn" onclick="goMap()">RETURN TO MAP</button>
        ${!pass ? `<button class="btn danger" onclick="actuallyStartBoss()">RETRY BOSS</button>` : ''}
      </div>
    </div>
  `;
}

// ============================================================
// EVENT HANDLERS
// ============================================================
function goMap() {
  sfx.click();
  state.screen = 'map';
  state.currentRoomId = null;
  state.currentQIdx = 0;
  state.currentAnswer = null;
  state.answered = false;
  state.roomResults = [];
  state.lives = 3;  // refill lives between rooms
  render();
}

function startRoom(id) {
  sfx.click();
  state.screen = 'room';
  state.currentRoomId = id;
  state.currentQIdx = 0;
  state.currentAnswer = null;
  state.answered = false;
  state.roomResults = [];
  state.lives = 3;
  state.streak = 0;
  // shuffle each room's MCQ option order? No — keep stable for muscle memory.
  // Reset any shuffled match arrays so they re-shuffle on retry:
  ROOMS.find(r => r.id === id).questions.forEach(q => { if (q.type === 'match') delete q._shuffledRight; });
  render();
}

function pickOption(i) {
  if (state.answered) return;
  sfx.click();
  state.currentAnswer = i;
  render();
}

function pickMatchLeft(leftIdx) {
  if (state.answered) return;
  const ans = state.currentAnswer;
  if (ans.pairs[leftIdx] !== undefined) {
    // already paired — unpair
    delete ans.pairs[leftIdx];
    ans.picking = null;
  } else {
    ans.picking = leftIdx;
  }
  sfx.click();
  render();
  maybeFinalizeMatch();
}

function pickMatchRight(rightIdx) {
  if (state.answered) return;
  const ans = state.currentAnswer;
  // if this right is already paired, do nothing
  if (Object.values(ans.pairs).includes(rightIdx)) return;
  if (ans.picking === null) return;
  ans.pairs[ans.picking] = rightIdx;
  ans.picking = null;
  sfx.click();
  render();
  maybeFinalizeMatch();
}

function maybeFinalizeMatch() {
  const q = ROOMS.find(r => r.id === state.currentRoomId)?.questions[state.currentQIdx]
            || BOSS_POOL?.[state.currentQIdx];
  if (!q || q.type !== 'match') return;
  const ans = state.currentAnswer;
  const pairCount = Object.keys(ans.pairs).length;
  document.getElementById('submitBtn').disabled = pairCount !== q.pairs.length;
}

function submitAnswer() {
  const room = state.bossActive
    ? { questions: BOSS_POOL, id: 'BOSS' }
    : ROOMS.find(r => r.id === state.currentRoomId);
  const q = room.questions[state.currentQIdx];
  let correct = false;
  if (q.type === 'mcq') correct = state.currentAnswer === q.correct;
  else if (q.type === 'error') correct = state.currentAnswer === q.wrongIndex;
  else if (q.type === 'numeric') {
    const ans = parseFloat(state.currentAnswer);
    correct = !isNaN(ans) && Math.abs(ans - q.answer) <= (q.tolerance ?? 0.01);
  } else if (q.type === 'match') {
    correct = q.pairs.every((_, i) => state.currentAnswer.pairs[i] === i);
  }

  state.answered = true;
  state.lastCorrect = correct;
  state.roomResults.push(correct);

  if (correct) {
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    const mult = Math.min(5, 1 + Math.floor(state.streak / 3));
    const gain = (state.bossActive ? 100 : 50) * mult;
    state.totalXp += gain;
    sfx.correct();
  } else {
    state.streak = 0;
    state.lives--;
    sfx.wrong();
  }
  save();
  render();

  // If out of lives mid-room, end the room
  if (state.lives <= 0 && !state.bossActive) {
    setTimeout(() => endRoom(), 1400);
  } else if (state.lives <= 0 && state.bossActive) {
    setTimeout(() => endBoss(), 1400);
  }
}

function nextQuestion() {
  const room = state.bossActive ? { questions: BOSS_POOL } : ROOMS.find(r => r.id === state.currentRoomId);
  state.currentQIdx++;
  state.currentAnswer = null;
  state.answered = false;
  if (state.currentQIdx >= room.questions.length) {
    if (state.bossActive) endBoss();
    else endRoom();
    return;
  }
  // Reset match answer if next is match
  const nextQ = room.questions[state.currentQIdx];
  if (nextQ.type === 'match') state.currentAnswer = { pairs: {}, picking: null };
  render();
}

function endRoom() {
  state.screen = 'result';
  render();
}

function abandonRoom() {
  if (!confirm('Leave this room? Progress within the room is lost.')) return;
  goMap();
}

// ============================================================
// BOSS
// ============================================================
let BOSS_POOL = [];
function startBoss() {
  sfx.click();
  state.screen = 'boss-intro';
  render();
}

function actuallyStartBoss() {
  sfx.boss();
  // Build pool: 10 random from rooms + 5 exclusive
  const allRoomQs = ROOMS.flatMap(r => r.questions);
  BOSS_POOL = [...shuffle(allRoomQs).slice(0, 10), ...BOSS_EXCLUSIVE].sort(() => Math.random() - 0.5);
  // Clear any prior match shuffles
  BOSS_POOL.forEach(q => { if (q.type === 'match') delete q._shuffledRight; });
  state.bossActive = true;
  state.screen = 'room';
  state.currentRoomId = '★ BOSS ROUND ★';
  state.currentQIdx = 0;
  state.currentAnswer = BOSS_POOL[0].type === 'match' ? { pairs: {}, picking: null } : null;
  state.answered = false;
  state.roomResults = [];
  state.lives = 3;
  state.streak = 0;
  // Patch the room lookup: render uses currentRoomId, so we wrap
  render();
}

function endBoss() {
  state.bossActive = false;
  state.screen = 'boss-result';
  render();
}

// Patch render() for boss: when bossActive, treat currentRoom as BOSS_POOL
const originalRenderRoom = renderRoom;
renderRoom = function() {
  if (!state.bossActive) return originalRenderRoom();
  const q = BOSS_POOL[state.currentQIdx];
  if (!q) { state.screen = 'boss-result'; render(); return; }
  let html = renderHUD();
  html += `
    <div class="question-header">
      <div class="breadcrumb">// <span class="accent" style="color: var(--danger);">★ BOSS ROUND</span> · EXAM SIMULATION</div>
      <div class="q-progress">Q ${state.currentQIdx + 1} / ${BOSS_POOL.length}</div>
    </div>
    <div class="question-card boss-mode">
      <div class="q-type-badge" style="border-color: var(--danger); color: var(--danger);">${q.type.toUpperCase()}</div>
      <div class="q-prompt">${q.prompt}</div>
      ${renderQuestionBody(q)}
      ${state.answered ? renderFeedback(q) : ''}
      <div class="q-actions">
        ${state.answered
          ? `<button class="btn danger" onclick="nextQuestion()">${state.currentQIdx + 1 >= BOSS_POOL.length ? 'FINALIZE' : 'NEXT →'}</button>`
          : `<button class="btn danger" id="submitBtn" onclick="submitAnswer()" ${state.currentAnswer === null || (typeof state.currentAnswer === 'object' && Object.keys(state.currentAnswer.pairs || {}).length !== (q.pairs?.length || 0)) ? 'disabled' : ''}>SUBMIT</button>`}
        <button class="btn secondary" onclick="abandonBoss()">ABANDON</button>
      </div>
    </div>
  `;
  app.innerHTML = html;
};

function abandonBoss() {
  if (!confirm('Abandon the boss round? You will need to clear all rooms again to retry.')) return;
  state.bossActive = false;
  goMap();
}

// ============================================================
// UTIL
// ============================================================
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============================================================
// BOOT
// ============================================================
render();
</script>
</body>
</html>
